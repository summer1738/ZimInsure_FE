<div class="container py-4">
  <h2 class="mb-4">My Profile</h2>

  <div class="card shadow-lg profile-card">
    <div class="card-header bg-primary text-white">
      <h5 class="modal-title mb-0"><i class="bi bi-person me-2"></i>Profile details</h5>
    </div>
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      <div class="card-body">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label font-weight-bold">Full Name</label>
            <input type="text" class="form-control" formControlName="full_name" placeholder="Full name" />
            <div *ngIf="profileForm.get('full_name')?.invalid && profileForm.get('full_name')?.touched" class="text-danger small mt-1">
              Full name is required.
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label font-weight-bold">Email</label>
            <input type="email" class="form-control form-control-plaintext bg-light" formControlName="email" readonly />
            <div class="form-text">Email cannot be changed.</div>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label font-weight-bold">Phone</label>
            <input type="text" class="form-control" formControlName="phone" placeholder="Phone" />
            <div *ngIf="profileForm.get('phone')?.invalid && profileForm.get('phone')?.touched" class="text-danger small mt-1">
              Phone is required.
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label font-weight-bold">ID Number</label>
            <input type="text" class="form-control" formControlName="idNumber" placeholder="ID number" />
            <div *ngIf="profileForm.get('idNumber')?.invalid && profileForm.get('idNumber')?.touched" class="text-danger small mt-1">
              ID number is required.
            </div>
          </div>
          <div class="col-12 mb-3">
            <label class="form-label font-weight-bold">Address</label>
            <input type="text" class="form-control" formControlName="address" placeholder="Address" />
            <div *ngIf="profileForm.get('address')?.invalid && profileForm.get('address')?.touched" class="text-danger small mt-1">
              Address is required.
            </div>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label font-weight-bold">Status</label>
            <input type="text" class="form-control form-control-plaintext bg-light" formControlName="status" readonly />
          </div>
        </div>
      </div>
      <div class="card-footer bg-light d-flex justify-content-end gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="profileForm.invalid">
          <i class="bi bi-check-circle me-1"></i> Update profile
        </button>
      </div>
    </form>
  </div>
</div>
