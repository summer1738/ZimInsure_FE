<div class="register-heading text-center" style="margin-top: 32px;">
  <h2 style="margin-bottom: 18px; font-weight: 700; color: #1890ff; letter-spacing: 1px;">ZimInsure</h2>
  <div style="font-size:1.1em; color:#888; margin-bottom: 18px;">Create your account</div>
</div>
<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
  <div class="form-group mb-3">
    <label class="form-label">Full Name</label>
    <div>
      <input type="text" class="form-control" formControlName="full_name" placeholder="Full Name" />
    </div>
  </div>

  <div class="form-group mb-3">
    <label class="form-label">Email</label>
    <div>
      <input type="email" class="form-control" formControlName="email" placeholder="Email" />
    </div>
  </div>

  <div class="form-group mb-3">
    <label class="form-label">Password</label>
    <div>
      <input type="password" class="form-control" formControlName="password" placeholder="Password" />
    </div>
  </div>

  <div class="form-group mb-3">
    <label class="form-label">Confirm Password</label>
    <div>
      <input type="password" class="form-control" formControlName="confirmPassword" placeholder="Confirm Password" />
    </div>
  </div>

  <div class="form-group mb-3">
    <label class="form-label">ID Number</label>
    <div>
      <input type="text" class="form-control" formControlName="idNumber" placeholder="ID Number" />
    </div>
  </div>

  <div class="form-group mb-3">
    <label class="form-label">Address</label>
    <div>
      <input type="text" class="form-control" formControlName="address" placeholder="Address" />
    </div>
  </div>

  <div class="form-group mb-3">
    <label class="form-label">Phone</label>
    <div>
      <input type="text" class="form-control" formControlName="phone" placeholder="Phone (optional)" />
    </div>
  </div>

  <div *ngIf="errorMessage" class="error-message" style="color: red; margin-bottom: 1em;">{{ errorMessage }}</div>

  <button type="submit" class="btn btn-primary w-100" [disabled]="registerForm.invalid || loading">
    Register
  </button>
  <div class="mt-3 text-center">
    Already have an account? <a routerLink="/login">Login</a>
  </div>
</form>
